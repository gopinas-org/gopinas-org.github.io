---
layout: default
---
{% include hero.html type="compact" %}
<main class="container container-lg py-4 pb-5 flex-grow-1">
  <article>
    <header class="mb-4">
      <h1 class="heading-rule fs-3 fw-bold mb-2">{{ page.title }}</h1>
      {% if page.date %}
        <p class="text-secondary small mb-0">
          <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%B %-d, %Y' }}</time>
        </p>
      {% endif %}
    </header>
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</main>
